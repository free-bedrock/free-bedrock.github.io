<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Openplace</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-inner">
    <a href="info.html" class="tb-info">Info</a>
    <div class="tb-search">
      <input type="text" placeholder="Search...">
      <div class="tb-search-btn">🔍</div>
    </div>
    <div class="tb-join">+ Join the Project</div>
  </div>
</div>

<!-- LAYOUT -->
<div class="layout">
  <div class="scroll" id="scroll">
    <div class="mw">

      <!-- HERO BANNER -->
      <div class="hero-banner">
        <div class="hero-banner-inner">
          <div class="hero-title">Open<span>place</span></div>
          <div class="hero-sub">The Java experience, for Bedrock.</div>
          <div class="hero-tags">
            <span class="hero-tag green">No cost</span>
            <span class="hero-tag silver">No ads</span>
          </div>
        </div>
      </div>

      <div class="cat-bar">
        <a href="index.html?filter=all" class="cat-tab active" data-filter="all"><span class="cat-tab-icon"></span>All</a>
        <a href="index.html?filter=quality-of-life" class="cat-tab" data-filter="quality-of-life"><span class="cat-tab-icon"></span>Quality of life</a>
        <a href="index.html?filter=competitive" class="cat-tab" data-filter="competitive"><span class="cat-tab-icon"></span>Competitive</a>
        <a href="index.html?filter=casual" class="cat-tab" data-filter="casual"><span class="cat-tab-icon"></span>Casual</a>
      </div>
      <div class="cat-divider"></div>
      
      <div class="listing">
        <div class="listing-hd">Featured</div>
        <div class="listing-grid" id="listing-grid">
          <!-- Cards will be generated by JS from data attributes -->
        </div>
      </div>

    </div>
  </div>
</div>

<script src="addons-data.js"></script>
<script src="main.js"></script>
</body>
</html>
